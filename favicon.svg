<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Earth horizon arc at the bottom -->
  <path d="M 0 28 A 22 22 0 0 1 32 28 L 32 32 L 0 32 Z" fill="currentColor" opacity="0.18"/>
  <path d="M 0 28 A 22 22 0 0 1 32 28" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.8"/>

  <!-- Satellite body -->
  <rect x="13" y="9" width="6" height="8" fill="currentColor" rx="0.6"/>

  <!-- Solar panels (left and right) -->
  <rect x="3" y="11" width="9" height="4" fill="none" stroke="currentColor" stroke-width="1.1"/>
  <line x1="6" y1="11" x2="6" y2="15" stroke="currentColor" stroke-width="0.8"/>
  <line x1="9" y1="11" x2="9" y2="15" stroke="currentColor" stroke-width="0.8"/>

  <rect x="20" y="11" width="9" height="4" fill="none" stroke="currentColor" stroke-width="1.1"/>
  <line x1="23" y1="11" x2="23" y2="15" stroke="currentColor" stroke-width="0.8"/>
  <line x1="26" y1="11" x2="26" y2="15" stroke="currentColor" stroke-width="0.8"/>

  <!-- Antenna -->
  <line x1="16" y1="9" x2="16" y2="5" stroke="currentColor" stroke-width="1"/>
  <circle cx="16" cy="4" r="1" fill="currentColor"/>

  <style>svg { color: #2563eb; } @media (prefers-color-scheme: dark) { svg { color: #60a5fa; } }</style>
</svg>
